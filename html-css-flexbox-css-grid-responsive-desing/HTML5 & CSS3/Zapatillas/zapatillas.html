<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>zapatillas</title>
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/estylos.css">
</head>
<body>
	<div id="wrapper">
		<header>
				<h1></h1>
		</header>
		<section>
			<article>
				<div id="producto">
				</div>
			</article>
			<aside>
				<div id="headaside">
					<div class="cajahead">
						<h1>Top Ten Hi Sleek Mujer</h1>
						<p><span><img src="" alt=""></span>Disponible en stock las próximas 24hr.</p>
					</div>
					<div class="cajalogo">
						<img src="" alt="">
					</div>
				</div>
				<form action="#" method="#">
					<p class="colorete">
						<label for="color">COLOR <span>(G14822)</span></label>
						<input type="color" id="color">
					</p>
					<div class="galeria">
						<ul>
							<li><img src="img/G14822_F_Photography_Standard.jpg" alt="zapatillas"></li>
							<li><img src="img/G14822_B_Photography_Standard.jpg" alt=""></li>
							<li><img src="img/G14822_FR_Photography_Standard.jpg" alt=""></li>
							<li><img src="img/G14822_SM_Photography_Standard.jpg" alt=""></li>
							<li><img src="img/G14822_TP_Photography_Standard.jpg" alt=""></li>
						</ul>
					</div>
					<p class="tallarines">
						<label for="talla">TALLA <a href="#">(Guia de tallas)</a></label>
						<input type="range" min="0" max="60" id="talla" value="36" list="tickmarks">
							<datalist id="tickmarks">
							  <option value="0">
							  <option value="10">
							  <option value="20">
							  <option value="30">
							  <option value="40">
							  <option value="50">
							  <option value="60">
							</datalist>
					</p>
					<div class="estrellitas">
						<p class="estrellas"></p>
						<p class="leer">
							<a href="#">Leer una valoración</a>
							<a href="#">Escriba una valoración</a>
						</p>
					</div>
					<div class="precio">
						<p class="precioeuro">97,00 €</p>
						<p class="boton">
							<input type="button" value="Añadir al carrito" >
						</p>
					</div>
				</form>
				<div class="enlaces">
					<a href="#">Enviar a un amigo</a>
					<a href="#">Añadir a la lista de deseos</a>
				</div>
			</aside>
		</section>
		
	</div>


	
</body>
</html>
