<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Grid better than Position</title>
	<style>
		body {
		  display: grid;
		  min-height: 100vh;
		  align-content: center;
		  justify-content: center;
		}

		.poster {
		  width: 400px;
		  height: 400px;
		  display: grid;
		  grid-template-columns: 1fr;
		  grid-template-rows: 1fr 50px;
		  border-radius: .5em;
		  overflow: hidden;
		}

		.poster__img {
		  width: 100%;
		  height: 100%;	
		  -o-object-fit: cover;
		     object-fit: cover;
		  grid-row: 1 / 3;
		  grid-column: 1;
		}

		.poster__description {
		  grid-row: 2;
		  grid-column: 1;
		  background: rgba(0, 0, 0, 0.8);
		  color: #fff;
		  margin: 0;
		  text-align: center;
		  padding: 1em;
		}

	</style>
</head>
<body>
	<div class="poster">
  <img src="https://images.unsplash.com/photo-1507146426996-ef05306b995a?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1050&q=80" alt="Cachorro" class="poster__img">
  <p class="poster__description">Tu mejor amigo</p>
</div>
</body>
</html>
