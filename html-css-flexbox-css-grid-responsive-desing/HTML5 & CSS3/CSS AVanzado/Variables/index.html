<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Variables CSS (Custom Properties)</title>
	<!-- herencia
	Cascada -->
		<style>
		
		:root{
			--color: green;
			--white: white;
			--titulos: red;
			--box-shadow: 2px 5px 5px #000;
		}

		body{
			background: var(--color);
			margin: 10px;
		}

		h1 {
			background: var(--white);
			color: var(--titulos);
			box-shadow: var(--box-shadow);
		}

	</style>
	
</head>
<body>
	<h1>CSS VARIABLES</h1>
<!-- 	problema de css no es un programa de programacion, carece de variables, condicionales, ciclos...

	una variable = un lugar donde almacenas un valor para reutilizarlo -->


</body>
</html>
