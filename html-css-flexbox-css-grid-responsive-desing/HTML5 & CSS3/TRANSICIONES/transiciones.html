<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Transiciones</title>
</head>
<style>
	/* http://meyerweb.com/eric/tools/css/reset/ 
   v2.0 | 20110126
   License: none (public domain)
*/

html, body, div, span, applet, object, iframe,
h1, h2, h3, h4, h5, h6, p, blockquote, pre,
a, abbr, acronym, address, big, cite, code,
del, dfn, em, img, ins, kbd, q, s, samp,
small, strike, strong, sub, sup, tt, var,
b, u, i, center,
dl, dt, dd, ol, ul, li,
fieldset, form, label, legend,
table, caption, tbody, tfoot, thead, tr, th, td,
article, aside, canvas, details, embed, 
figure, figcaption, footer, header, hgroup, 
menu, nav, output, ruby, section, summary,
time, mark, audio, video {
	margin: 0;
	padding: 0;
	border: 0;
	font-size: 100%;
	font: inherit;
	vertical-align: baseline;
}
/* HTML5 display-role reset for older browsers */
article, aside, details, figcaption, figure, 
footer, header, hgroup, menu, nav, section {
	display: block;
}
body {
	line-height: 1;
}
ol, ul {
	list-style: none;
}
blockquote, q {
	quotes: none;
}
blockquote:before, blockquote:after,
q:before, q:after {
	content: '';
	content: none;
}
table {
	border-collapse: collapse;
	border-spacing: 0;
}
/*------------css real-----------------*/
body{
	font-family: verdana,sans-serif;
	font-size: 12px;
	padding-top: 20px;
}
.canvas{
	width: 750px; height: 600px; 
	margin: 0 auto; 
	border: 1px solid #ccc; 
	position: relative;
	cursor: pointer;
}
.transition{
	border-radius: 100px;
	height: 200px;
	width: 200px;
	background-color: blue;
	position: absolute;
	top: 200px;
	left: 275px;
}
.element{
	border-radius: 50px;
	height: 50px;
	width: 50px;
	background-color: red;
	position: absolute;
	top: 275px;
	left: 350px;
}
.one{
	-webkit-transition: all 1s ease;
	-o-transition: all 1s ease;
	transition: all 1s ease;
}
.canvas:hover .one{
	-webkit-transform: translate(-350px, -275px);
	   -moz-transform: translate(-350px, -275px);
	    -ms-transform: translate(-350px, -275px);
	     -o-transform: translate(-350px, -275px);
	        transform: translate(-350px, -275px);
}
</style>
<body>
	<div class="canvas">
		<div class="transition"></div>
		<p class="element one"></p>
	</div>	
</body>
</html>
