<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Variables 3</title>
	<style>
		:root {
		  --color: hsl(5,90%,50%);
		  --message: "Default";
		}

		body {
		  background: var(--color);
		  display: grid;
		  min-height: 100vh;
		  align-content: center;
		  justify-content: center;
		}

		body::before {
		  content: var(--message);
		  font-size: 5em;
		  color: #fff;
		  font-weight: bold;
		}

		@media screen and (min-width: 40em) {
		   :root {
		    --color: hsl(130,80%,30%);
		    --message: "40em";
		  }
		}

		@media screen and (min-width: 60em) {
		  :root {
		    --color: hsl(200,80%,30%);
		    --message: "60em";
		  }
		}

		@media screen and (max-width: 40em) and (orientation: landscape) {
		  :root {
		    --color: hsl(240, 90%,40%);
		    --message: "Landscape";
		  }
		}

		@media screen and (min-aspect-ratio: 16/9) {
		  :root {
		    --color: hsl(320, 90%,40%);
		    --message: "16/9";
		    }
		}

	</style>
</head>
<body>
	
</body>
</html>
