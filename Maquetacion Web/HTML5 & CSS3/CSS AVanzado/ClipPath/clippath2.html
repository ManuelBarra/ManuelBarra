<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style>
			.container{
			position: relative;
			width: 450px;
			margin:auto;
		}

		img {
			max-width: 100%;
			clip-path: inset(0 0 10% 2%);
		}

		h1{
			position: absolute;
			width: 100%;
			top: 150px;
			left: -10px;
			border-right: 4px solid tomato;
			text-align: right;
			font-size: 1.5em;
			margin: 0;
			line-height: 1.4;
			background: white;
			padding: 20px;
			clip-path: polygon(100% 35%, 0 34%, 100% 100%);
		}
	</style>
</head>
<body>
	<div class="container">
		<img src="biblioChadwick.jpg" alt="#">
		<h1>CLIP-PATH SEMINARIO</h1>
	</div>
</body>
</html>
