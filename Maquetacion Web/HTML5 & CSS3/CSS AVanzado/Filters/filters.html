<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Filters</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
	<style>
		button {
		  position: absolute;
		  top: 10px;
		  right: 10px;
		  z-index: 1;
		  /*filter:drop-shadow(8px 8px 10px gray);*/
		   box-shadow: 5px 10px 8px #888888;
		
 
		/*Esta función es similar a la propiedad box-shadow más establecida; La diferencia es que con los filtros, algunos navegadores proporcionan aceleración de hardware para un mejor rendimiento.
		 también imita el contorno de los objetos deseados de forma natural, a diferencia de la sombra de caja que trata solo la caja como su ruta.*/
		}

		img { display: block; width: 60%; }

		img.animated {
		  -webkit-animation: filter-animation 5s infinite;
		}

		@-webkit-keyframes filter-animation {
		  0% {
		    -webkit-filter: sepia(0) saturate(2);
		  }
		  
		  50% {
		    -webkit-filter: sepia(1) saturate(8);
		  }
		  
		  100% {
		   
		  }
		  
		}


		.bird{
		  	filter: hue-rotate(180deg);
		  	 
		  }
	</style>
</head>
<body>
