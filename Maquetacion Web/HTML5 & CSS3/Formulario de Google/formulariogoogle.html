<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Formulario Google</title>
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/estilos.css">
</head>
<body>
	<div id="wrapper">
		<header role=[header]>
			<a href="#"><img src="img/google_logo_41.png" alt="Google"></a>
			<a href="#"><img src="img/logo_espai_transparente_41.png" alt="Espai" ></a>
			<a href="#"><input type="button" value="Iniciar Seción" /></a>
		</header>
		<section>
		<div class="formulario">
			<h1>Crea tu cuenta de Google-Espai</h1>
			<form id="form" action="#" method="#" autocomplete="on">
				<p>
					<label for="nombre">Nombre</label>
					<input type="text" id="nombre" name="nombre" placeholder="Nombre"	value="" pattern="[A-z]{2,20}" required/>
					<input type="text" id="apellido" name="apellido" value="" placeholder="Apellido" pattern="[A-z]{2,20}" required/>
				</p>
				<p>
					<label for="nombredeusuario">Nombre de usuario</label>
					<input type="email" name="nombredeusuario" id="nombredeusuario" placeholder="@gmail" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required/>
				</p>
				<p>
					<label for="password">Contraseña</label>
					<input type="password" id="password" pattern="[A-Z]{1}[a-z]{1}[0-9]{8}" name="password" required/>
				</p>
				<p>
					<label for="password">Confirma tu contraseña</label>
					<input type="password" id="password" pattern="[A-Z]{1}[a-z]{1}[0-9]{8}" name="re-password" required/>
				</p>
				<p>
					<label for="datetime" >Fecha de nacimiento</label>
					<input type="datetime" id="datetime" placeholder="dd/mm/aaaa" name="datetime">
				</p>
				<p>
					<label for="lista-sexo">Sexo</label>
					<select type="text"	list="lista-sexo" id="lista-sexo" name="Sexo" /> 
						<option value="01" selected disabled>Selecionar</option>
						<option value="Hombre">Hombre</option>
						<option value="Mujer">Mujer</option>
					</select>
				</p>
				<p>
					<label for="tel">Teléfono móvil</label>
					<input type="tel" id="tel" name="tel" 	 pattern="[0-9, A-z]{9}">
				</p>
				<p>
					<input type="checkbox" name="acepto" id="acepto" required/>
					<p id="acepto">Acepto las <a href="#">Condiciones de servicio </a>y la <a href="#">Politica de privacidad</a> de Google Espai</p>
				</p>
				<p>
					<input type="submit" name="enviar" id="enviar" value="Siguiente paso"/>
				</p>
			</form>
		</div>
		</section>
	</div>
</body>
</html>
